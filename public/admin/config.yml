# Decap guarda cada entrada como Markdown en GitHub; no existe una base de datos.
backend:
  name: github
  repo: ladardrgz/issrc-web
  branch: main
  site_domain: https://issrc-web.ladardrgz.workers.dev
  base_url: https://issrc-web.ladardrgz.workers.dev
  auth_endpoint: /api/auth
  auth_scope: public_repo

local_backend: true
publish_mode: editorial_workflow

# Traduce la interfaz general de Decap CMS. Los nombres, ayudas y opciones de
# cada campo se definen en español más abajo para orientar a los editores.
locale: es
site_url: https://issrc-web.ladardrgz.workers.dev
display_url: https://issrc-web.ladardrgz.workers.dev
logo_url: /images/branding/logo-redisenado.png

# Seguridad operativa:
# - Imágenes: se gestionan desde Cloudinary y se pega la URL pública de entrega.
# - Documentos PDF: se comparten desde Google Drive y se pega el enlace público.
# - No guardar API secrets, tokens ni credenciales en este repositorio.
media_folder: public/uploads/images
public_folder: /uploads/images

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: noticias
    label: Noticias y comunicados
    label_singular: Noticia o comunicado
    description: Publicaciones institucionales revisadas antes de llegar al sitio público.
    folder: src/content/noticias
    create: true
    delete: false
    extension: md
    format: frontmatter
    identifier_field: slug
    slug: "{{slug}}"
    summary: "{{date}} · {{category}} · {{title}}"
    sortable_fields: [date, title, category, status]
    view_filters:
      - label: Borradores
        field: status
        pattern: draft
      - label: Publicadas
        field: status
        pattern: published
    fields:
      - label: Título
        name: title
        widget: string
        required: true
        minlength: 5
        maxlength: 120
      - label: Slug
        name: slug
        widget: string
        required: true
        minlength: 3
        maxlength: 100
        hint: "URL sin espacios ni acentos. Ejemplo: inscripciones-2026. No cambiar después de publicar."
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Usá minúsculas, números y guiones simples. No uses espacios, tildes ni símbolos."]
      - label: Fecha
        name: date
        widget: datetime
        required: true
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Categoría
        name: category
        widget: select
        required: true
        options: [Institucional, Comunicado, Académica, Actividades]
        default: Institucional
      - label: Resumen
        name: summary
        widget: text
        required: false
        maxlength: 280
        hint: "Opcional. Máximo 280 caracteres. Si queda vacío, la tarjeta no muestra un texto de relleno."
      - label: URL de imagen destacada en Cloudinary
        name: featuredImage
        widget: string
        required: false
        hint: "Opcional. Subí la imagen en Cloudinary, copiá la URL segura y pegala acá. Debe empezar con https://res.cloudinary.com/dw9odd2n1/image/upload/ y terminar en .avif, .gif, .jpg, .jpeg, .png o .webp."
        pattern:
          - '^$|^https:\/\/res\.cloudinary\.com\/dw9odd2n1\/image\/upload\/[^?#]+\.(?:avif|gif|jpe?g|png|webp)(?:[?#].*)?$'
          - "La imagen debe ser una URL segura de Cloudinary del cloud dw9odd2n1 y terminar en AVIF, GIF, JPG, JPEG, PNG o WebP. No pegues enlaces de la consola ni de otros sitios."
      - label: Enlace público del PDF en Google Drive
        name: pdf
        widget: string
        required: false
        hint: "Opcional. Subí el PDF a Google Drive, compartilo como 'Cualquier persona con el enlace puede ver' y pegá el enlace acá. Formato recomendado: https://drive.google.com/file/d/ID_DEL_ARCHIVO/view?usp=sharing. No pegues enlaces de carpetas ni archivos privados."
        pattern:
          - '^$|^https:\/\/drive\.google\.com\/(?:file\/d\/[A-Za-z0-9_-]+(?:\/(?:view|preview))?|open\?id=[A-Za-z0-9_-]+|uc\?(?:export=download&)?id=[A-Za-z0-9_-]+)(?:[?&][^\s]*)?$'
          - "El PDF debe ser un enlace público de Google Drive. Usá Compartir → Cualquier persona con el enlace puede ver → Copiar enlace. No pegues enlaces de carpetas, documentos privados ni URLs de Cloudinary para PDFs."
      - label: Estado
        name: status
        widget: select
        required: true
        options:
          - { label: Borrador, value: draft }
          - { label: Publicado, value: published }
        default: draft
        hint: "Debe estar en Publicado y completar el flujo editorial para aparecer en el sitio."
      - label: Contenido principal
        name: body
        widget: markdown
        required: true
        minimal: true
        buttons: [bold, italic, code, link, heading-two, heading-three, quote, bulleted-list, numbered-list]
        editor_components: []
        hint: "Usá Markdown. Por seguridad, evitá pegar HTML crudo, scripts, iframes, formularios o imágenes dentro del cuerpo. Para imágenes, usá el campo URL de imagen destacada."
